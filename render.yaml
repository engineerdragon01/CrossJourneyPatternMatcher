services:
  - type: web
    name: crossjourney-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false       # set manually in Render dashboard
      - key: VOYAGE_API_KEY
        sync: false       # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false       # set to your Vercel URL, e.g. https://crossjourney.vercel.app
